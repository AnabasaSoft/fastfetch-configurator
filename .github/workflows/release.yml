name: Compilar y Empaquetar

on:
  push:
    tags:
      - 'v*' # Se ejecuta automáticamente al subir un tag como v1.0
  workflow_dispatch: # Permite ejecutarlo a mano desde la web

jobs:
  build:
    name: Compilar en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías necesarias
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 ansi2html pyinstaller Pillow

      - name: Compilar con PyInstaller (Linux / macOS)
        if: runner.os != 'Windows'
        run: pyinstaller --noconsole --onefile --icon=icono.png --add-data "icono.png:." --name FastfetchConfig main.py

      - name: Compilar con PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --noconsole --onefile --icon=icono.png --add-data "icono.png;." --name FastfetchConfig main.py

      - name: Instalar FPM para crear .deb y .rpm (Solo Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install --no-document fpm

      - name: Crear paquetes .deb y .rpm (Solo Linux)
        if: runner.os == 'Linux'
        run: |
          fpm -s dir -t deb -n fastfetch-config -v 1.0.0 --prefix /usr/bin -p dist/fastfetch-config.deb dist/FastfetchConfig
          fpm -s dir -t rpm -n fastfetch-config -v 1.0.0 --prefix /usr/bin -p dist/fastfetch-config.rpm dist/FastfetchConfig

      - name: Subir binarios a la Release de GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/FastfetchConfig*
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
